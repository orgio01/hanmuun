<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category — HANMUN</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <header class="topbar" role="banner">
      <div class="topbar__util">
        <div class="topbar__utilInner">
          <nav class="topbar__utilNav">
            <a href="/profile.html?mode=login">Нэвтрэх</a>
            <span>|</span>
            <a href="/profile.html?mode=signup">Бүртгүүлэх</a>
            <span>|</span>
            <a href="/my-orders">Захиалга</a>
            <span>|</span>
            <a href="/seller">Seller</a>
          </nav>
        </div>
      </div>

      <nav class="topbar__inner" aria-label="Top navigation">
        <div class="topbar__left">
          <a class="icon-btn" href="/" aria-label="Нүүр хуудас">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18 9 12l6-6"/></svg>
          </a>
          <a class="brand" href="/" aria-label="HANMUN home"><span class="brand__logo">HANMUN</span></a>
        </div>

        <div class="topbar__center">
          <form class="search" role="search" aria-label="Site search" data-search-nav>
            <label class="sr-only" for="searchInputCat">Бараа хайх</label>
            <div class="search__field">
              <input id="searchInputCat" name="q" type="search" placeholder="Бараа, брэнд хайх…" autocomplete="off" data-search-input />
              <button class="search__voiceBtn" type="button" data-voice-search aria-label="Дуу хоолойгоор хайх">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <button class="search__btn" type="submit" aria-label="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm11 3-6.2-6.2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
              </button>
            </div>
          </form>
        </div>

        <div class="topbar__right">
          <a class="topbar__action" href="/profile.html" aria-label="Профайл">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M20 21a8 8 0 1 0-16 0" stroke-linecap="round"/><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/></svg>
            <span class="topbar__actionLabel">Профайл</span>
          </a>
          <a class="topbar__action" href="/cart.html" aria-label="Сагс">
            <div class="topbar__actionIconWrap">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 7h15l-2 10H8L6 7Zm2 14a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm10 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM6 7 5 3H2"/></svg>
              <span class="cartBadge" data-cart-badge hidden>0</span>
            </div>
            <span class="topbar__actionLabel">Сагс</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="catPage" id="main">

      <!-- Breadcrumb -->
      <nav class="catPage__breadcrumb" aria-label="breadcrumb">
        <a href="/">Нүүр</a>
        <span aria-hidden="true">›</span>
        <span data-cat-name aria-current="page">Ангилал</span>
      </nav>

      <!-- Header row -->
      <div class="catPage__head">
        <div class="catPage__headLeft">
          <div class="catPage__icon" data-cat-icon aria-hidden="true"></div>
          <h1 class="catPage__title" data-cat-title>Уншиж байна…</h1>
        </div>
        <span class="catPage__count" data-cat-count></span>
      </div>

      <!-- Sort bar -->
      <div class="catPage__sortBar">
        <span class="catPage__sortLabel">Эрэмбэлэх:</span>
        <div class="catPage__sortBtns">
          <button class="catPage__sortBtn is-active" type="button" data-sort="default">Нэр</button>
          <button class="catPage__sortBtn" type="button" data-sort="price-asc">Үнэ ↑</button>
          <button class="catPage__sortBtn" type="button" data-sort="price-desc">Үнэ ↓</button>
          <button class="catPage__sortBtn" type="button" data-sort="discount">Хямдрал</button>
        </div>
      </div>

      <!-- Product grid (loading skeletons) -->
      <div class="grid" data-cat-grid>
        <div class="catSkeleton card"></div>
        <div class="catSkeleton card"></div>
        <div class="catSkeleton card"></div>
        <div class="catSkeleton card"></div>
      </div>

      <!-- Empty state -->
      <div class="catEmpty" data-cat-empty hidden>
        <div class="catEmpty__icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <p class="catEmpty__title">Бараа олдсонгүй</p>
        <p class="catEmpty__hint">Энэ ангиллын бараа одоогоор байхгүй байна.</p>
        <a class="catEmpty__btn" href="/">Нүүр хуудас руу буцах</a>
      </div>

    </main>

    <nav class="bottomNav" aria-label="Bottom navigation">
      <a class="bottomNav__item" href="/">Нүүр</a>
      <a class="bottomNav__item" href="/cart.html">Сагс</a>
      <a class="bottomNav__item" href="/my-orders">Захиалга</a>
      <a class="bottomNav__item" href="/profile.html">Профайл</a>
    </nav>

    <script type="module" src="/js/category.js"></script>
  </body>
</html>
