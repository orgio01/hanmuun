<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Seller Center — HANMUN</title>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      padding: 24px 16px;
    }

    .sc-wrap {
      width: 100%;
      max-width: 400px;
    }

    .sc-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .sc-brand__logo {
      font-size: 1.4rem;
      font-weight: 950;
      letter-spacing: -.03em;
      color: #0f172a;
    }
    .sc-brand__tag {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: #64748b;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .sc-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }

    .sc-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #e2e8f0;
    }
    .sc-tab {
      padding: 13px;
      border: 0;
      background: transparent;
      font: inherit;
      font-size: .84rem;
      font-weight: 700;
      color: #94a3b8;
      cursor: pointer;
      position: relative;
      transition: color .15s;
    }
    .sc-tab.is-active {
      color: #0f172a;
    }
    .sc-tab.is-active::after {
      content: "";
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: #0f172a;
    }

    .sc-pane { padding: 24px; }
    .sc-pane[hidden] { display: none; }

    .sc-error {
      display: none;
      padding: 9px 12px;
      margin-bottom: 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: .82rem;
      font-weight: 650;
      border-radius: 4px;
    }

    .sc-field {
      display: grid;
      gap: 5px;
      margin-bottom: 12px;
    }
    .sc-field label {
      font-size: .76rem;
      font-weight: 700;
      color: #64748b;
    }
    .sc-field input {
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 10px 12px;
      font: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .sc-field input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.07);
    }

    .sc-btn {
      width: 100%;
      padding: 11px;
      margin-top: 4px;
      background: #0f172a;
      color: #fff;
      border: 0;
      border-radius: 5px;
      font: inherit;
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s;
    }
    .sc-btn:hover { opacity: .88; }
    .sc-btn:disabled { opacity: .5; cursor: not-allowed; }

    .sc-switch {
      margin-top: 14px;
      font-size: .78rem;
      color: #94a3b8;
      text-align: center;
    }
    .sc-switch button {
      border: 0; background: transparent;
      color: #0f172a; font-weight: 800;
      cursor: pointer; font: inherit;
      font-size: .78rem; padding: 0;
    }
    .sc-switch button:hover { text-decoration: underline; }

    .sc-note {
      font-size: .76rem;
      color: #94a3b8;
      text-align: center;
      margin-top: 6px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="sc-wrap">
    <div class="sc-brand">
      <span class="sc-brand__logo">HANMUN</span>
      <span class="sc-brand__tag">Seller Center</span>
    </div>

    <div class="sc-card">

      <div class="sc-tabs">
        <button class="sc-tab is-active" type="button" data-tab="login">Нэвтрэх</button>
        <button class="sc-tab" type="button" data-tab="register">Бүртгүүлэх</button>
      </div>

      <!-- Нэвтрэх -->
      <div class="sc-pane" data-pane="login">
        <div class="sc-error" data-login-error hidden></div>
        <div class="sc-field">
          <label>И-мэйл</label>
          <input id="slEmail" type="email" autocomplete="email" placeholder="seller@gmail.com"/>
        </div>
        <div class="sc-field">
          <label>Нууц үг</label>
          <input id="slPass" type="password" autocomplete="current-password" placeholder="Нууц үг"/>
        </div>
        <button class="sc-btn" type="button" data-login-btn>Нэвтрэх</button>
        <p class="sc-switch">
          Бүртгэлгүй юу? <button type="button" data-switch="register">Бүртгүүлэх →</button>
        </p>
      </div>

      <!-- Бүртгүүлэх -->
      <div class="sc-pane" data-pane="register" style="display:none">
        <div class="sc-error" data-reg-error hidden></div>
        <div class="sc-field">
          <label>Дэлгүүрийн нэр</label>
          <input id="slShop" type="text" placeholder="Дэлгүүрийн нэр"/>
        </div>
        <div class="sc-field">
          <label>И-мэйл</label>
          <input id="slRegEmail" type="email" autocomplete="email" placeholder="seller@gmail.com"/>
        </div>
        <div class="sc-field">
          <label>Нууц үг</label>
          <input id="slRegPass" type="password" autocomplete="new-password" placeholder="8+ тэмдэгт"/>
        </div>
        <div class="sc-field">
          <label>Утас</label>
          <input id="slPhone" type="tel" inputmode="numeric" placeholder="8 оронтой дугаар"/>
        </div>
        <button class="sc-btn" type="button" data-reg-btn>Хүсэлт илгээх</button>
        <p class="sc-note">Admin зөвшөөрсний дараа нэвтрэх боломжтой болно</p>
        <p class="sc-switch">
          Бүртгэлтэй юу? <button type="button" data-switch="login">Нэвтрэх →</button>
        </p>
      </div>

    </div>
  </div>

  <script type="module" src="/js/seller.js"></script>
</body>
</html>
